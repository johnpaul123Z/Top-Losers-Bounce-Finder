services:
  - type: web
    name: ai-bounce-finder
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && cd ui && npm ci && npm run build
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: DASHBOARD_TOKEN
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: cron
    name: ai-bounce-finder-daily-trade
    env: python
    schedule: "30 14 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python trade_top_pick.py --shares 1000 --take-profit-pct 7 --stop-loss-pct 3.5
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
